<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathomancer · Карта Мира</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #d4a030;
            --gold-light: #f5d78a;
            --gold-glow: rgba(212, 160, 48, 0.3);
            --parchment: #1a1410;
            --parchment-light: #2a2018;
            --ink: #d4c5a0;
            --ink-dim: #8a7a5a;
            --blood: #8b1a1a;
            --mana: #4a7ab5;
            --forest: #2d5a3a;
            --fire: #8a3a1a;
            --void: #1a1a2a;
        }

        body {
            background: var(--parchment);
            background-image: 
                radial-gradient(ellipse at 20% 50%, #2a1a0a 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, #1a0a0a 0%, transparent 70%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a030' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0;
            margin: 0;
            color: var(--ink);
            overflow: hidden;
            height: 100vh;
            font-family: 'IM Fell English', serif;
        }

        .app-header {
            width: 100%;
            max-width: 100%;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(26, 20, 16, 0.95), rgba(26, 20, 16, 0.7));
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 30px rgba(212, 160, 48, 0.1);
            position: sticky;
            top: 0;
            z-index: 20;
            flex-shrink: 0;
            gap: 6px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold-light);
            text-shadow: 0 0 20px var(--gold-glow);
            letter-spacing: 2px;
        }

        .header-left .badge {
            background: rgba(212, 160, 48, 0.12);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--gold-light);
            border: 1px solid rgba(212, 160, 48, 0.15);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .xp-display {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gold-light);
            background: rgba(212, 160, 48, 0.06);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(212, 160, 48, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Cinzel', serif;
        }

        .xp-display .level {
            font-size: 0.65rem;
            color: var(--ink-dim);
            margin-left: 4px;
        }

        .header-btn {
            background: rgba(212, 160, 48, 0.06);
            border: 1px solid rgba(212, 160, 48, 0.08);
            color: var(--gold-light);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'IM Fell English', serif;
        }

        .header-btn:hover {
            background: rgba(212, 160, 48, 0.15);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .header-btn .badge-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--gold);
            color: var(--parchment);
            font-size: 0.5rem;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
        }

        /* ===== КАРТА МИРА ===== */
        .world-map-container {
            width: 100%;
            max-width: 100%;
            padding: 6px 16px;
            background: linear-gradient(180deg, rgba(26, 20, 16, 0.9), rgba(26, 20, 16, 0.4));
            border-bottom: 1px solid rgba(212, 160, 48, 0.04);
            flex-shrink: 0;
            position: sticky;
            top: 56px;
            z-index: 10;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .world-map-container::-webkit-scrollbar { display: none; }

        .world-map {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            min-width: max-content;
        }

        .location-btn {
            background: rgba(212, 160, 48, 0.04);
            border: 1px solid rgba(212, 160, 48, 0.06);
            border-radius: 30px;
            padding: 6px 18px 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink-dim);
            font-size: 0.7rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .location-btn .icon { font-size: 1rem; }
        .location-btn .check { display: none; font-size: 0.7rem; color: #4caf50; margin-left: 4px; }
        .location-btn.completed .check { display: inline; }
        .location-btn.completed { border-color: rgba(76, 175, 80, 0.15); background: rgba(76, 175, 80, 0.04); }
        .location-btn.active { background: rgba(212, 160, 48, 0.08); border-color: var(--gold); color: var(--gold-light); box-shadow: 0 0 30px rgba(212, 160, 48, 0.05); }
        .location-btn:hover { background: rgba(212, 160, 48, 0.06); transform: translateY(-1px); }
        .location-btn.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        /* ===== ПРОГРЕСС ЛОКАЦИИ ===== */
        .location-progress {
            width: 100%;
            max-width: 100%;
            padding: 4px 16px;
            background: rgba(26, 20, 16, 0.3);
            flex-shrink: 0;
            position: sticky;
            top: 100px;
            z-index: 9;
        }

        .location-progress .bar-bg {
            width: 100%;
            height: 3px;
            background: rgba(212, 160, 48, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .location-progress .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.2, 0.9, 0.4, 1);
            border-radius: 4px;
        }

        .location-progress .label {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--ink-dim);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            margin-top: 3px;
            opacity: 0.6;
        }

        /* ===== КОНТЕЙНЕР КАРТОЧЕК ===== */
        .shorts-container {
            width: 100%;
            max-width: 100%;
            padding: 8px 16px 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            height: calc(100vh - 200px);
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex: 1;
            position: relative;
        }

        .shorts-container::-webkit-scrollbar { display: none; width: 0; }

        .scroll-blocker {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.01);
            cursor: default;
            pointer-events: all;
        }
        .scroll-blocker.active { display: block; }

        /* ===== СВИТОК (карточка) ===== */
        .scroll {
            width: 100%;
            max-width: 560px;
            min-height: 380px;
            max-height: 520px;
            border-radius: 20px;
            perspective: 1200px;
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            animation: scrollAppear 0.6s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
            position: relative;
        }

        @keyframes scrollAppear {
            0% { opacity: 0; transform: scale(0.92) translateY(40px) rotate(-2deg); }
            100% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
        }

        .scroll.flipped .scroll-inner { transform: rotateY(180deg); }

        .scroll-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 380px;
            max-height: 520px;
            transition: transform 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
            transform-style: preserve-3d;
        }

        .scroll-front,
        .scroll-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            padding: 24px 22px 26px 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            background: linear-gradient(145deg, #2a1f18, #1a1410);
            border: 1px solid rgba(212, 160, 48, 0.06);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.8);
        }

        .scroll-front::before,
        .scroll-back::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(212, 160, 48, 0.02);
            border-radius: 14px;
            pointer-events: none;
        }

        .scroll-front {
            background: linear-gradient(145deg, #2a1f18, #1a1410);
        }
        .scroll-front::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(212, 160, 48, 0.02), transparent 70%);
            pointer-events: none;
        }

        .scroll-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #1a1410, #0d0a08);
            border-color: rgba(212, 160, 48, 0.08);
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px 20px;
        }

        .scroll-back .solution-title {
            font-size: 0.65rem;
            color: var(--ink-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-family: 'Cinzel', serif;
        }

        .scroll-back .solution-text {
            font-size: 1rem;
            color: var(--gold-light);
            font-weight: 500;
            line-height: 1.7;
            font-family: 'Georgia', serif;
        }

        .scroll-back .solution-hint {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--mana);
            opacity: 0.7;
            font-style: italic;
        }

        /* ===== ЗОЛОТОЙ СВИТОК (босс) ===== */
        .scroll.gold .scroll-front {
            background: linear-gradient(145deg, #2a1a0a, #1a1008);
            border: 2px solid var(--gold);
            box-shadow: 0 0 60px rgba(212, 160, 48, 0.08), 0 10px 40px -10px rgba(0, 0, 0, 0.8);
        }
        .scroll.gold .scroll-front::after {
            background: radial-gradient(circle at 30% 40%, rgba(212, 160, 48, 0.06), transparent 70%);
        }
        .scroll.gold .scroll-back {
            background: linear-gradient(145deg, #1a1008, #0d0805);
            border-color: rgba(212, 160, 48, 0.12);
        }
        .scroll.gold .card-number {
            background: rgba(212, 160, 48, 0.15);
            border-color: var(--gold);
            color: var(--gold-light);
        }
        .scroll.gold .card-tag {
            background: rgba(212, 160, 48, 0.08);
            border-color: rgba(212, 160, 48, 0.12);
            color: var(--gold-light);
        }

        .gold-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0b1424;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(212, 160, 48, 0.2);
            z-index: 5;
            border: 1px solid rgba(255, 215, 100, 0.15);
            font-family: 'Cinzel', serif;
        }

        .lock-message {
            display: none;
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: var(--gold-light);
            border: 1px solid rgba(212, 160, 48, 0.12);
            z-index: 15;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.5px;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
        }
        .scroll.gold.locked .lock-message { display: block; }

        /* ===== АРТЕФАКТ ===== */
        .scroll.artifact .scroll-front {
            background: linear-gradient(145deg, #1a1a2a, #0d0d1a);
            border: 2px solid #7b68ee;
            box-shadow: 0 0 60px rgba(123, 104, 238, 0.08), 0 10px 40px -10px rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .scroll.artifact .artifact-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: artifactPulse 3s ease-in-out infinite;
        }
        @keyframes artifactPulse {
            0%, 100% { transform: scale(1) rotate(0deg); text-shadow: 0 0 20px rgba(123, 104, 238, 0.2); }
            50% { transform: scale(1.05) rotate(3deg); text-shadow: 0 0 40px rgba(123, 104, 238, 0.4); }
        }
        .scroll.artifact .artifact-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b8a0ff, #7b68ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            font-family: 'Cinzel', serif;
        }
        .scroll.artifact .artifact-subtitle {
            font-size: 0.95rem;
            color: #b8a0ff;
            margin-bottom: 4px;
            font-weight: 500;
            opacity: 0.8;
        }
        .scroll.artifact .artifact-reward {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold-light);
            text-shadow: 0 0 30px rgba(212, 160, 48, 0.1);
            margin: 6px 0;
            font-family: 'Cinzel', serif;
        }
        .scroll.artifact .artifact-message {
            font-size: 0.85rem;
            color: var(--ink-dim);
            opacity: 0.8;
            line-height: 1.6;
            margin-top: 6px;
            padding: 0 10px;
        }
        .artifact-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: linear-gradient(135deg, #7b68ee, #5a4aad);
            color: #fff;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(123, 104, 238, 0.1);
            z-index: 5;
            border: 1px solid rgba(123, 104, 238, 0.15);
            font-family: 'Cinzel', serif;
        }

        /* ===== МЕТА ===== */
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            color: var(--ink-dim);
            border-bottom: 1px solid rgba(212, 160, 48, 0.04);
            padding-bottom: 10px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .card-number {
            background: rgba(212, 160, 48, 0.04);
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 600;
            color: var(--ink);
            border: 1px solid rgba(212, 160, 48, 0.04);
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
        }

        .card-tag {
            background: rgba(100, 180, 255, 0.04);
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 500;
            color: var(--mana);
            border: 1px solid rgba(100, 180, 255, 0.04);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ===== ТЕКСТ ЗАДАЧИ ===== */
        .task-text {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 500;
            color: var(--ink);
            padding: 4px 0 10px 0;
            flex: 1 1 auto;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            letter-spacing: 0.2px;
            font-family: 'Georgia', serif;
        }

        .task-text .highlight {
            color: var(--gold-light);
            font-weight: 600;
        }

        /* ===== ВАРИАНТЫ ОТВЕТОВ ===== */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .option-btn {
            background: rgba(212, 160, 48, 0.04);
            border: 1px solid rgba(212, 160, 48, 0.06);
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.85rem;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Georgia', serif;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-btn:hover:not(.disabled) {
            background: rgba(212, 160, 48, 0.08);
            border-color: var(--gold);
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--gold);
            background: rgba(212, 160, 48, 0.08);
        }

        .option-btn.correct {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.08);
            color: #b0e0a0;
        }

        .option-btn.wrong {
            border-color: var(--blood);
            background: rgba(139, 26, 26, 0.08);
            color: #d47a7a;
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .option-btn .letter {
            font-weight: 700;
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            width: 20px;
        }

        /* ===== ПОЛЕ ВВОДА ===== */
        .answer-input {
            flex: 1 1 90px;
            padding: 8px 14px;
            border: 1px solid rgba(212, 160, 48, 0.06);
            border-radius: 60px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            color: var(--ink);
            font-weight: 450;
            outline: none;
            transition: all 0.3s;
            min-width: 60px;
            font-family: 'Georgia', serif;
        }

        .answer-input::placeholder {
            color: var(--ink-dim);
            font-weight: 300;
            font-size: 0.75rem;
            opacity: 0.4;
        }

        .answer-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 160, 48, 0.04);
            background: rgba(255, 255, 255, 0.04);
        }

        .answer-input.shake {
            animation: shake 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            border-color: var(--blood) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .btn-hint {
            background: rgba(212, 160, 48, 0.04);
            border: 1px solid rgba(212, 160, 48, 0.06);
            padding: 8px 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--gold-light);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.3px;
        }

        .btn-hint:hover {
            background: rgba(212, 160, 48, 0.08);
            box-shadow: 0 0 20px rgba(212, 160, 48, 0.04);
        }

        .btn-hint:active { transform: scale(0.94); }

        .hint-box {
            background: rgba(20, 16, 12, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 10px 16px;
            border-left: 3px solid var(--gold);
            font-size: 0.85rem;
            color: var(--ink-dim);
            line-height: 1.5;
            animation: hintPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 160, 48, 0.04);
            font-style: italic;
            font-family: 'Georgia', serif;
        }

        .hint-box.hidden { display: none; }

        @keyframes hintPop {
            0% { opacity: 0.3; transform: scale(0.96) translateY(-6px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .flex-row {

        };

        const ACHIEVEMENTS = [
            { id: 'first_solve', icon: '🪄', name: 'Ученик чародея', desc: 'Решил первую задачу' },
            { id: 'five_solves', icon: '⚔️', name: 'Мастер стихий', desc: 'Решил 5 задач' },
            { id: 'gold_solve', icon: '💎', name: 'Великий Архимаг', desc: 'Решил босса' },
            { id: 'artifact_found', icon: '🔮', name: 'Хранитель Артефакта', desc: 'Нашёл магический артефакт' },
            { id: 'perfect_score', icon: '👑', name: 'Легенда Академии', desc: 'Набрал 100+ XP' }
        ];

        // ============================================
        // ОСНОВНАЯ ЛОГИКА
        // ============================================
        const Mathomancer = {
            state: {
                score: 0,
                solvedCards: {},
                goldSolved: false,
                goldReached: false,
                unlockedAchievements: [],
                artifactFound: false,
                currentLocation: 'logic',
                locationProgress: {}
            },
            elements: {},

            init() {
                this.loadState();
                this.elements = {
                    container: document.getElementById('shortsContainer'),
                    blocker: document.getElementById('scrollBlocker'),
                    scoreDisplay: document.getElementById('scoreValue'),
                    levelDisplay: document.getElementById('levelDisplay'),
                    worldMap: document.getElementById('worldMap'),
                    locationBarFill: document.getElementById('locationBarFill'),
                    locationLabel: document.getElementById('locationLabel'),
                    locationCounter: document.getElementById('locationCounter'),
                    toast: document.getElementById('toast'),
                    achievementBtn: document.getElementById('achievementBtn'),
                    achievementCount: document.getElementById('achievementCount'),
                    achievementsModal: document.getElementById('achievementsModal'),
                    achievementsList: document.getElementById('achievementsList'),
                    achievementsClose: document.getElementById('achievementsClose'),
                    confettiContainer: document.getElementById('confettiContainer'),
                    goldCard: null,
                    goldCheckBtn: null
                };
                this.renderWorldMap();
                this.loadLocation(this.state.currentLocation);
                this.updateScore();
                this.updateAchievementBadge();
                this.attachGlobalEvents();
                this.initEvents();
                this.initAchievementsModal();
                console.log('🧙 Mathomancer v2.1 (исправлены варианты)');
            },

            loadState() {
                try {
                    const saved = localStorage.getItem('mathomancer_state_v3');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.state.score = data.score || 0;
                        this.state.solvedCards = data.solvedCards || {};
                        this.state.goldSolved = data.goldSolved || false;
                        this.state.unlockedAchievements = data.unlockedAchievements || [];
                        this.state.artifactFound = data.artifactFound || false;
                        this.state.currentLocation = data.currentLocation || 'logic';
                        this.state.locationProgress = data.locationProgress || {};
                    }
                } catch (e) {}
            },

            saveState() {
                localStorage.setItem('mathomancer_state_v3', JSON.stringify({
                    score: this.state.score,
                    solvedCards: this.state.solvedCards,
                    goldSolved: this.state.goldSolved,
                    unlockedAchievements: this.state.unlockedAchievements,
                    artifactFound: this.state.artifactFound,
                    currentLocation: this.state.currentLocation,
                    locationProgress: this.state.locationProgress
                }));
            },

            // ===== КАРТА МИРА =====
            renderWorldMap() {
                const map = this.elements.worldMap;
                map.innerHTML = '';

                LOCATIONS.forEach((loc, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'location-btn';
                    btn.dataset.id = loc.id;

                    const tasks = this.getLocationTasks(loc.id);
                    const solved = tasks.filter(t => this.state.solvedCards[t.id]).length;
                    if (solved >= 3) btn.classList.add('completed');

                    if (index > 0) {
                        const prevLoc = LOCATIONS[index - 1];
                        const prevTasks = this.getLocationTasks(prevLoc.id);
                        const prevSolved = prevTasks.filter(t => this.state.solvedCards[t.id]).length;
                        if (prevSolved < 3) btn.classList.add('locked');
                    }

                    if (loc.id === this.state.currentLocation) btn.classList.add('active');

                    btn.innerHTML = `
                        <span class="icon">${loc.icon}</span>
                        ${loc.name}
                        <span class="check">✅</span>
                    `;

                    btn.addEventListener('click', () => {
                        if (btn.classList.contains('locked')) {
                            this.showToast('🔒 Сначала пройди предыдущую локацию (>=3 задач)!', 'error');
                            return;
                        }
                        this.state.currentLocation = loc.id;
                        this.loadLocation(loc.id);
                        this.renderWorldMap();
                    });

                    map.appendChild(btn);
                });
            },

            getLocationTasks(locationId) {
                const loc = LOCATIONS.find(l => l.id === locationId);
                if (!loc) return [];
                const tasks = loc.tasks.map(t => ({ ...t, location: locationId }));
                const goldCopy = { ...GOLD_CARD, id: `gold_${locationId}`, location: locationId };
                return [...tasks, goldCopy];
            },

            getLocationProgress(locationId) {
                const tasks = this.getLocationTasks(locationId);
                const solved = tasks.filter(t => this.state.solvedCards[t.id]).length;
                const total = tasks.length;
                return { solved, total };
            },

            // ===== ЗАГРУЗКА ЛОКАЦИИ =====
            loadLocation(locationId) {
                const loc = LOCATIONS.find(l => l.id === locationId);
                if (!loc) return;

                const tasks = this.getLocationTasks(locationId);
                const progress = this.getLocationProgress(locationId);

                this.elements.locationLabel.textContent = `${loc.icon} ${loc.name}`;
                this.elements.locationCounter.textContent = `${progress.solved}/${progress.total}`;
                const percent = progress.total > 0 ? (progress.solved / progress.total) * 100 : 0;
                this.elements.locationBarFill.style.width = `${percent}%`;

                this.renderCards(tasks);
                this.elements.container.scrollTop = 0;

                const lastLoc = LOCATIONS[LOCATIONS.length - 1];
                if (locationId === lastLoc.id && progress.solved >= 3 && !this.state.artifactFound) {
                    setTimeout(() => {
                        this.showArtifact();
                    }, 600);
                }

                this.state.currentLocation = locationId;
                this.saveState();
                this.renderWorldMap();
            },

            // ===== РЕНДЕР КАРТОЧЕК =====
            renderCards(tasks) {
                const container = this.elements.container;
                container.innerHTML = '';

                tasks.forEach(data => {
                    if (data.isArtifact) return;
                    container.appendChild(this.createScroll(data));
                });

                const lastLoc = LOCATIONS[LOCATIONS.length - 1];
                if (this.state.currentLocation === lastLoc.id && this.state.artifactFound) {
                    const art = this.createArtifact();
                    container.appendChild(art);
                }

                const footer = document.createElement('div');
                footer.className = 'footer-note';
                footer.textContent = '✍️ Напиши ответ или выбери вариант · Нажми на свиток для решения';
                container.appendChild(footer);

                this.elements.goldCard = document.getElementById('goldCard');
                this.elements.goldCheckBtn = document.getElementById('goldCheckBtn');
            },

            createScroll(data) {
                const wrapper = document.createElement('div');
                wrapper.className = 'scroll';
                if (data.isGold) wrapper.classList.add('gold');
                if (this.state.solvedCards[data.id]) wrapper.classList.add('solved');
                wrapper.dataset.taskId = data.id;

                const inner = document.createElement('div');
                inner.className = 'scroll-inner';

                const front = document.createElement('div');
                front.className = 'scroll-front';

                const isSolved = this.state.solvedCards[data.id];
                let interactionHTML = '';

                if (isSolved) {
                    interactionHTML = `<div style="color: #4caf50; text-align: center; padding: 8px;">✅ Заклинание изучено!</div>`;
                } else {
                    if (data.hasOptions && data.options && data.options.length > 0) {
                        let optionsHTML = `<div class="options-container" data-task-id="${data.id}">`;
                        const letters = ['А', 'Б', 'В', 'Г', 'Д'];
                        data.options.forEach((opt, idx) => {
                            const letter = letters[idx] || '•';
                            optionsHTML += `
                                <button class="option-btn" data-value="${opt}" data-task="${data.id}">
                                    <span class="letter">${letter}</span> ${opt}
                                </button>
                            `;
                        });
                        optionsHTML += `</div>`;
                        interactionHTML = optionsHTML;
                    } else {
                        interactionHTML = `
                            <div class="answer-row">
                                <input class="answer-input" type="text" placeholder="впиши заклинание..." id="answer${data.id}">
                                <button class="btn-hint" data-target="hint${data.id}">🔮</button>
                            </div>
                            <div id="hint${data.id}" class="hint-box hidden">${data.hint}</div>
                            <div class="flex-row">
                                <button class="check-btn" data-answer="${data.answer}" data-feedback="feedback${data.id}" data-id="${data.id}" data-gold="${data.isGold || false}">Проверить</button>
                                <span class="feedback-message" id="feedback${data.id}"></span>
                            </div>
                        `;
                    }
                }

                const isGoldAttr = data.isGold ? 'true' : 'false';
                if (data.isGold) {
                    front.innerHTML = `
                        <span class="gold-badge">👑 Босс</span>
                        <div class="lock-message">🔒 Победи босса, чтобы двигаться дальше</div>
                        <div class="card-meta">
                            <span class="card-number">${data.number}</span>
                            <span class="card-tag">${data.tag}</span>
                        </div>
                        <div class="task-text">${data.text}</div>
                        <div class="interaction-area" id="interaction-${data.id}">
                            ${interactionHTML}
                            <div class="msg-revealed">🔮 Ты уже видел решение — ответить нельзя</div>
                        </div>
                        <div class="flip-hint">👆 Нажми на свиток для решения</div>
                    `;
                } else {
                    front.innerHTML = `
                        <div class="card-meta">
                            <span class="card-number">#${data.id}</span>
                            <span class="card-tag">🧙 Испытание</span>
                        </div>
                        <div class="task-text">${data.text}</div>
                        <div class="interaction-area" id="interaction-${data.id}">
                            ${interactionHTML}
                            <div class="msg-revealed">🔮 Ты уже видел решение — ответить нельзя</div>
                        </div>
                        <div class="flip-hint">👆 Нажми на свиток для решения</div>
                    `;
                }

                const back = document.createElement('div');
                back.className = 'scroll-back';
                back.innerHTML = `
                    <div class="solution-title">📜 Решение</div>
                    <div class="solution-text">${data.solution || data.answer}</div>
                    <div class="solution-hint">💡 ${data.hint || ''}</div>
                `;

                inner.appendChild(front);
                inner.appendChild(back);
                wrapper.appendChild(inner);

                wrapper.addEventListener('click', function(e) {
                    if (e.target.closest('.answer-input, .btn-hint, .check-btn, .option-btn, .flex-row')) return;
                    this.classList.toggle('flipped');
                    const interaction = this.querySelector('.interaction-area');
                    if (interaction) {
                        if (this.classList.contains('flipped')) {
                            interaction.classList.add('disabled');
                        }
                    }
                });

                if (isSolved) {
                    const interaction = wrapper.querySelector('.interaction-area');
                    if (interaction) interaction.classList.add('disabled');
                }

                return wrapper;
            },

            createArtifact() {
                const wrapper = document.createElement('div');
                wrapper.className = 'scroll artifact';
                wrapper.dataset.taskId = 'artifact';

                const inner = document.createElement('div');
                inner.className = 'scroll-inner';

                const front = document.createElement('div');
                front.className = 'scroll-front';
                front.innerHTML = `
                    <span class="artifact-badge">🔮 Артефакт</span>
                    <div class="artifact-icon">🔮</div>
                    <div class="artifact-title">Скрижаль Мудрости</div>
                    <div class="artifact-subtitle">✨ Древний артефакт Академии</div>
                    <div class="artifact-reward">+50 XP</div>
                    <div class="artifact-message">Ты доказал свою силу и мудрость!<br>Артефакт признаёт тебя достойным.</div>
                `;

                const back = document.createElement('div');
                back.className = 'scroll-back';
                back.innerHTML = `
                    <div class="solution-title">🏆</div>
                    <div class="solution-text">Ты — настоящий Магомант!</div>
                    <div class="solution-hint">🔥 Ты прошёл все испытания</div>
                `;

                inner.appendChild(front);
                inner.appendChild(back);
                wrapper.appendChild(inner);

                wrapper.addEventListener('click', function(e) {
                    this.classList.toggle('flipped');
                });

                return wrapper;
            },

            showArtifact() {
                if (this.state.artifactFound) return;
                this.state.artifactFound = true;
                this.addScore(50);
                this.unlockAchievement('artifact_found');
                this.fireConfetti(200);
                this.showToast('🔮 Ты нашёл Скрижаль Мудрости! +50 XP!', 'achievement');
                this.saveState();
                this.loadLocation(this.state.currentLocation);
            },

            // ===== УРОВНИ =====
            getLevel(score) {
                if (score >= 150) return { title: '👑 Легенда', color: '#ff6b6b' };
                if (score >= 100) return { title: '💎 Архимаг', color: '#a8e6cf' };
                if (score >= 60) return { title: '🥇 Магистр', color: '#f5d78a' };
                if (score >= 30) return { title: '🥈 Чародей', color: '#c0c0c0' };
                return { title: '🪄 Ученик', color: '#cd7f32' };
            },

            // ===== ДОСТИЖЕНИЯ =====
            unlockAchievement(id) {
                if (this.state.unlockedAchievements.includes(id)) return;
                this.state.unlockedAchievements.push(id);
                this.saveState();
                this.updateAchievementBadge();
                const achievement = ACHIEVEMENTS.find(a => a.id === id);
                if (achievement) this.showToast(`🏅 Титул: ${achievement.icon} ${achievement.name}`, 'achievement');
            },

            updateAchievementBadge() {
                const count = this.state.unlockedAchievements.length;
                this.elements.achievementCount.textContent = count;
                this.elements.achievementCount.style.display = count > 0 ? 'flex' : 'none';
            },

            checkAchievements() {
                const solved = Object.keys(this.state.solvedCards).filter(id => this.state.solvedCards[id]).length;
                if (solved >= 1) this.unlockAchievement('first_solve');
                if (solved >= 5) this.unlockAchievement('five_solves');
                if (this.state.goldSolved) this.unlockAchievement('gold_solve');
                if (this.state.artifactFound) this.unlockAchievement('artifact_found');
                if (this.state.score >= 100) this.unlockAchievement('perfect_score');
            },

            renderAchievements() {
                const list = this.elements.achievementsList;
                list.innerHTML = '';
                ACHIEVEMENTS.forEach(ach => {
                    const unlocked = this.state.unlockedAchievements.includes(ach.id);
                    const item = document.createElement('div');
                    item.className = `achievement-item ${unlocked ? 'unlocked' : 'locked'}`;
                    item.innerHTML = `
                        <div class="icon">${ach.icon}</div>
                        <div class="info"><div class="name">${ach.name}</div><div class="desc">${ach.desc}</div></div>
                        <div class="status ${unlocked ? 'unlocked' : 'locked'}">${unlocked ? '✅' : '🔒'}</div>
                    `;
                    list.appendChild(item);
                });
            },

            initAchievementsModal() {
                this.elements.achievementBtn.addEventListener('click', () => {
                    this.renderAchievements();
                    this.elements.achievementsModal.classList.add('open');
                });
                this.elements.achievementsClose.addEventListener('click', () => {
                    this.elements.achievementsModal.classList.remove('open');
                });
                this.elements.achievementsModal.addEventListener('click', (e) => {
                    if (e.target === this.elements.achievementsModal) this.elements.achievementsModal.classList.remove('open');
                });
            },

            fireConfetti(count = 150) {
                const container = this.elements.confettiContainer;
                const colors = ['#d4a030', '#f5d78a', '#4caf50', '#64b5f6', '#ce93d8', '#ff8a65', '#a8e6cf', '#ffd93d', '#ff6b6b', '#7b68ee'];
                for (let i = 0; i < count; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    const size = 6 + Math.random() * 10;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const left = Math.random() * 100;
                    const duration = 2 + Math.random() * 3;
                    const delay = Math.random() * 2;
                    const shape = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.cssText = `left:${left}%;width:${size}px;height:${size}px;background:${color};border-radius:${shape};animation-duration:${duration}s;animation-delay:${delay}s;`;
                    container.appendChild(confetti);
                    setTimeout(() => confetti.remove(), (duration + delay) * 1000 + 100);
                }
                setTimeout(() => container.innerHTML = '', 6000);
            },

            updateScore() {
                this.elements.scoreDisplay.textContent = this.state.score;
                const level = this.getLevel(this.state.score);
                this.elements.levelDisplay.textContent = `(${level.title})`;
                this.elements.levelDisplay.style.color = level.color;
                this.checkAchievements();
            },

            markSolved(cardId) {
                this.state.solvedCards[cardId] = true;
                this.saveState();
                this.checkAchievements();
                const progress = this.getLocationProgress(this.state.currentLocation);
                this.elements.locationCounter.textContent = `${progress.solved}/${progress.total}`;
                const percent = progress.total > 0 ? (progress.solved / progress.total) * 100 : 0;
                this.elements.locationBarFill.style.width = `${percent}%`;
                this.renderWorldMap();

                const lastLoc = LOCATIONS[LOCATIONS.length - 1];
                if (this.state.currentLocation === lastLoc.id && progress.solved >= 3 && !this.state.artifactFound) {
                    setTimeout(() => {
                        this.showArtifact();
                    }, 600);
                }
            },

            addScore(points) {
                this.state.score += points;
                this.updateScore();
                this.saveState();
                this.checkAchievements();
            },

            showToast(message, type = 'info') {
                const toast = this.elements.toast;
                toast.textContent = message;
                toast.className = 'toast';
                toast.classList.add(type);
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => toast.classList.remove('show'), 2500);
            },

            // ===== ОБРАБОТКА ВАРИАНТОВ =====
            handleOptionClick(e, btn) {
                const value = btn.dataset.value;
                const taskId = btn.dataset.task;
                const card = btn.closest('.scroll');
                if (!card) return;
                const interaction = card.querySelector('.interaction-area');
                if (interaction && interaction.classList.contains('disabled')) return;
                if (this.state.solvedCards[taskId]) return;

                const allTasks = this.getLocationTasks(this.state.currentLocation);
                const task = allTasks.find(t => t.id === taskId);
                if (!task) return;

                const isCorrect = (value === task.answer);
                const allOptions = card.querySelectorAll('.option-btn');
                allOptions.forEach(opt => opt.classList.remove('selected', 'correct', 'wrong'));
                btn.classList.add('selected');

                if (isCorrect) {
                    btn.classList.add('correct');
                    if (!this.state.solvedCards[taskId]) {
                        this.addScore(task.isGold ? 50 : 10);
                        this.markSolved(taskId);
                        if (task.isGold) {
                            this.state.goldSolved = true;
                            this.unlockScroll();
                            this.showToast('🔥 Босс повержен! +50 XP!', 'success');
                        } else {
                            this.showToast('✨ Заклинание активировано! +10 XP!', 'success');
                        }
                    }
                    allOptions.forEach(opt => opt.classList.add('disabled'));
                } else {
                    btn.classList.add('wrong');
                    this.showToast('💨 Заклинание рассеялось...', 'error');
                }
            },

            // ===== ИНИЦИАЛИЗАЦИЯ СОБЫТИЙ =====
            initEvents() {
                document.addEventListener('click', (e) => {
                    const optionBtn = e.target.closest('.option-btn');
                    if (optionBtn) {
                        e.stopPropagation();
                        this.handleOptionClick(e, optionBtn);
                    }
                });

                this.initHints();
                this.initAnswerChecks();
                this.initEnterHandler();
                this.initResetHandler();
            },

            initHints() {
                document.querySelectorAll('.btn-hint').forEach(btn => {
                    btn.removeEventListener('click', this._hintHandler);
                    this._hintHandler = (e) => {
                        e.stopPropagation();
                        const target = document.getElementById(btn.dataset.target);
                        if (target) target.classList.toggle('hidden');
                    };
                    btn.addEventListener('click', this._hintHandler);
                });
            },

            initAnswerChecks() {
                document.querySelectorAll('.check-btn').forEach(btn => {
                    btn.removeEventListener('click', this._checkHandler);
                    this._checkHandler = (e) => this.handleAnswerCheck(e, btn);
                    btn.addEventListener('click', this._checkHandler);
                });
            },

            handleAnswerCheck(e, btn) {
                const card = btn.closest('.scroll');
                if (!card) return;
                const interaction = card.querySelector('.interaction-area');
                if (interaction && interaction.classList.contains('disabled')) return;

                const input = card.querySelector('.answer-input');
                const feedback = document.getElementById(btn.dataset.feedback);
                if (!input || !feedback) return;

                const user = input.value.trim();
                const expected = btn.dataset.answer;
                const cardId = btn.dataset.id;
                const isGold = btn.dataset.gold === 'true';

                if (user === '') {
                    feedback.textContent = '✍️ Напиши заклинание!';
                    feedback.className = 'feedback-message error';
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 500);
                    return;
                }

                let isCorrect = false;
                const numUser = Number(user);
                const numExpected = Number(expected);
                if (!isNaN(numUser) && !isNaN(numExpected) && user !== '' && expected !== '') {
                    isCorrect = numUser === numExpected;
                } else {
                    isCorrect = user.toLowerCase() === expected.toLowerCase();
                }

                feedback.className = 'feedback-message';
                if (isCorrect) {
                    if (!this.state.solvedCards[cardId]) {
                        this.addScore(isGold ? 50 : 10);
                        this.markSolved(cardId);
                        if (isGold) {
                            this.state.goldSolved = true;
                            this.unlockScroll();
                            btn.textContent = '✅ ПОБЕДА!';
                            btn.classList.add('gold-solved');
                            btn.disabled = true;
                            this.showToast('🔥 Босс повержен! +50 XP!', 'success');
                        } else {
                            this.showToast('✨ Заклинание активировано! +10 XP!', 'success');
                        }
                    } else {
                        this.showToast('📜 Уже изучено!', 'info');
                    }
                    feedback.textContent = isGold ? '🔥 Босс повержен!' : '✨ Верно!';
                    feedback.style.color = '#b0e0a0';
                    if (interaction) interaction.classList.add('disabled');
                } else {
                    feedback.textContent = '❌ Заклинание рассеялось... Попробуй ещё';
                    feedback.style.color = '#f7a0a0';
                    feedback.className = 'feedback-message error';
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 500);
                    this.showToast('💨 Заклинание рассеялось...', 'error');
                }
            },

            // ===== БЛОКИРОВКА СКРОЛЛА ДЛЯ БОССА =====
            lockScroll() {
                const { blocker, container, goldCard } = this.elements;
                blocker.classList.add('active');
                container.style.overflow = 'hidden';
                container.style.scrollSnapType = 'none';
                if (goldCard) goldCard.classList.add('locked');
            },

            unlockScroll() {
                const { blocker, container, goldCard } = this.elements;
                blocker.classList.remove('active');
                container.style.overflow = 'auto';
                container.style.scrollSnapType = 'y mandatory';
                if (goldCard) goldCard.classList.remove('locked');
            },

            forceScrollToGold() {
                const { goldCard } = this.elements;
                if (goldCard && !this.state.goldSolved && this.state.goldReached) {
                    goldCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    this.lockScroll();
                }
            },

            observeGoldCard() {
                const { goldCard } = this.elements;
                if (!goldCard) return;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !this.state.goldSolved) {
                            this.state.goldReached = true;
                            this.lockScroll();
                        }
                    });
                }, { threshold: 0.1 });
                observer.observe(goldCard);
            },

            attachGlobalEvents() {
                const self = this;
                document.addEventListener('wheel', function(e) {
                    if (!self.state.goldSolved && self.state.goldReached) {
                        if (e.target.closest('.answer-input, .btn-hint, .check-btn, .option-btn')) return;
                        e.preventDefault();
                        self.forceScrollToGold();
                    }
                }, { passive: false, capture: true });
                document.addEventListener('touchmove', function(e) {
                    if (!self.state.goldSolved && self.state.goldReached) {
                        if (e.target.closest('.answer-input, .btn-hint, .check-btn, .option-btn')) return;
                        e.preventDefault();
                        self.forceScrollToGold();
                    }
                }, { passive: false, capture: true });
                const { container, goldCard } = this.elements;
                container.addEventListener('scroll', function() {
                    if (!self.state.goldSolved && self.state.goldReached && goldCard) {
                        const rect = goldCard.getBoundingClientRect();
                        const containerRect = container.getBoundingClientRect();
                        if (rect.top < containerRect.top - 10 || rect.bottom > containerRect.bottom + 10) self.forceScrollToGold();
                    }
                });
            },

            initEnterHandler() {
                document.querySelectorAll('.answer-input').forEach(inp => {
                    inp.removeEventListener('keypress', this._enterHandler);
                    this._enterHandler = (e) => {
                        if (e.key === 'Enter') {
                            const card = inp.closest('.scroll');
                            if (card) {
                                const check = card.querySelector('.check-btn');
                                if (check) check.click();
                            }
                            e.preventDefault();
                        }
                    };
                    inp.addEventListener('keypress', this._enterHandler);
                });
            },

            initResetHandler() {
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if (confirm('Сбросить весь прогресс и начать новое приключение?')) {
                        this.state.score = 0;
                        this.state.solvedCards = {};
                        this.state.goldSolved = false;
                        this.state.unlockedAchievements = [];
                        this.state.artifactFound = false;
                        this.state.currentLocation = 'logic';
                        this.saveState();
                        this.updateScore();
                        this.updateAchievementBadge();
                        this.showToast('🔄 Прогресс сброшен', 'info');
                        this.loadLocation('logic');
                        this.renderWorldMap();
                        this.initEvents();
                        this.renderAchievements();
                        this.elements.container.scrollTop = 0;
                    }
                });
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            Mathomancer.init();
        });
    </script>

</body>
</html>
